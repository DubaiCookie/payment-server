# =====================================================
#  application.properties
#  - 로컬: 기본값(default) 사용
#  - 쿠버네티스: ConfigMap/Secret 으로 환경변수 주입
# =====================================================

# Server
server.port=${SERVER_PORT:8078}
spring.application.name=payment-server

# Database
# K8s ConfigMap : SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME
# K8s Secret    : SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/skala}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:skala}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Kafka
# K8s ConfigMap : SPRING_KAFKA_BOOTSTRAP_SERVERS
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:payment-server-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Toss Payment API
# K8s Secret : TOSS_PAYMENT_API_SECRET_KEY, TOSS_PAYMENT_API_CLIENT_KEY
toss.payment.api.url=${TOSS_PAYMENT_API_URL:https://api.tosspayments.com/v1}
toss.payment.api.secret-key=${TOSS_PAYMENT_API_SECRET_KEY}
toss.payment.api.client-key=${TOSS_PAYMENT_API_CLIENT_KEY}

# JWT
# K8s Secret : JWT_SECRET
jwt.secret=${JWT_SECRET}
jwt.issuer=${JWT_ISSUER:user-server}

# CORS / URLs
# K8s ConfigMap : CORS_SERVER_ORIGIN, CORS_SERVER_ORIGIN_SWAGGER
cors.server-origin=${CORS_SERVER_ORIGIN:http://localhost:3000}
cors.server-origin-swagger=${CORS_SERVER_ORIGIN_SWAGGER:http://localhost:8078}
cors.payment-server-origin=${CORS_PAYMENT_SERVER_ORIGIN:http://localhost:8078}
cors.ingress-origin=${CORS_INGRESS_ORIGIN:http://localhost:8080}

# Logging
logging.level.com.paymentserver=${LOGGING_LEVEL_COM_PAYMENTSERVER:DEBUG}
logging.level.org.springframework.web=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_ORG_HIBERNATE_SQL:DEBUG}
logging.level.org.springframework.kafka=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_KAFKA:INFO}

# Swagger (ingress prefix rewrite 환경)
springdoc.swagger-ui.config-url=/payment-server/v3/api-docs/swagger-config
springdoc.swagger-ui.urls-primary-name=Payment Server
springdoc.swagger-ui.urls[0].name=Payment Server
springdoc.swagger-ui.urls[0].url=/payment-server/v3/api-docs
springdoc.swagger-ui.urls[1].name=Attraction Server
springdoc.swagger-ui.urls[1].url=/attraction-server/v3/api-docs
springdoc.swagger-ui.urls[2].name=Food Server
springdoc.swagger-ui.urls[2].url=/food-server/v3/api-docs
springdoc.swagger-ui.urls[3].name=Ticket Server
springdoc.swagger-ui.urls[3].url=/ticket-server/v3/api-docs
springdoc.swagger-ui.urls[4].name=User Server
springdoc.swagger-ui.urls[4].url=/user-server/v3/api-docs
