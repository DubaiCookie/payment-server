apiVersion: v1
kind: ConfigMap
metadata:
  name: pay-server-config
  namespace: default
data:
  application.properties: |
    # Server Configuration
    server.port=8078

    # Database Configuration (MariaDB)
    spring.datasource.url=jdbc:mariadb://mariadb:3306/skala
    spring.datasource.username=skala
    spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

    # JPA/Hibernate Configuration
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.jpa.properties.hibernate.format_sql=true
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

    # Kafka Configuration
    spring.kafka.bootstrap-servers=kafka:9092
    spring.kafka.consumer.group-id=queue-group
    spring.kafka.consumer.auto-offset-reset=earliest
    spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
    spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
    spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
    spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

    # Toss Payment API Configuration
    toss.payment.api.url=https://api.tosspayments.com/v1

    # Logging
    logging.level.com.payserver=DEBUG
    logging.level.org.springframework.web=INFO
    logging.level.org.hibernate.SQL=DEBUG
    logging.level.org.springframework.kafka=INFO

    # App
    app.server-url=http://202.30.16.217:8078

    # CORS
    cors.server-origin=https://baeminjun.store
    cors.server-origin-swagger=http://202.30.16.217:8080
    cors.pay-server-origin=http://202.30.16.217:8078

    # JWT
    jwt.issuer=simple-auth-server

    # Springdoc / Swagger UI
    springdoc.swagger-ui.config-url=/pay-server/v3/api-docs/swagger-config
    springdoc.swagger-ui.url=/pay-server/v3/api-docs
