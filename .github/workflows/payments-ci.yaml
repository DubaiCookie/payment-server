name: Payments CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: amdp-registry.skala-ai.com/skala26a-cloud/team3-payment-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 01. 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: 02. JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 03. Gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 04. Gradle 빌드 (테스트 포함)
        run: ./gradlew clean build

      # PR은 여기까지만 실행 (이미지 빌드/푸시 제외)
      - name: 05. Docker Buildx 설정
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: 06. Harbor 로그인
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: amdp-registry.skala-ai.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: 07. 이미지 태그 생성
        if: github.event_name == 'push'
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: 08. Docker 이미지 빌드 & Push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 09. 오래된 이미지 정리 (최근 5개 유지)
        if: github.event_name == 'push'
        run: |
          HARBOR_URL="https://amdp-registry.skala-ai.com"
          PROJECT="skala26a-cloud"
          REPO="team3-payment-server"

          ARTIFACTS=$(curl -s -u "${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}" \
            "${HARBOR_URL}/api/v2.0/projects/${PROJECT}/repositories/${REPO}/artifacts?sort=-push_time&page_size=100")

          echo "$ARTIFACTS" | jq -r '.[5:] | .[].digest' | while read -r DIGEST; do
            echo "오래된 이미지 삭제: ${DIGEST}"
            curl -s -X DELETE -u "${{ secrets.HARBOR_USERNAME }}:${{ secrets.HARBOR_PASSWORD }}" \
              "${HARBOR_URL}/api/v2.0/projects/${PROJECT}/repositories/${REPO}/artifacts/${DIGEST}" \
              && echo "삭제 완료: ${DIGEST}" || echo "삭제 실패: ${DIGEST}"
          done

