name: CI - Build & Push to ECR

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO: skala3-cloud1-team3-payment-server

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build bootJar
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: ECR 리포지토리 생성 (없으면)
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPO --region $AWS_REGION \
            >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name $ECR_REPO --region $AWS_REGION \
            --image-scanning-configuration scanOnPush=true

      - name: Resolve image tag
        id: vars
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            IMAGE_TAG="${GITHUB_REF#refs/tags/}"
          else
            IMAGE_TAG="${GITHUB_REF_NAME}-${SHORT_SHA}"
          fi
          IMAGE_BASE="${{ steps.login-ecr.outputs.registry }}/${ECR_REPO}"
          echo "image_tag=${IMAGE_TAG}"                          >> "$GITHUB_OUTPUT"
          echo "image_base=${IMAGE_BASE}"                        >> "$GITHUB_OUTPUT"
          echo "image_versioned=${IMAGE_BASE}:${IMAGE_TAG}"      >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_BASE}:latest"               >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.vars.outputs.image_versioned }}
            ${{ steps.vars.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ steps.vars.outputs.image_versioned }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"

  update-chart:
    name: Update Helm chart values
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    env:
      SERVICE_KEY: paymentServer
      VALUES_PATH: charts/services/values.yaml

    steps:
      - name: Checkout chart repo
        uses: actions/checkout@v4
        with:
          repository: DubaiCookie/Chart
          token: ${{ secrets.CHART_REPO_TOKEN }}
          path: chart-repo

      - name: Update image tag and digest in services values
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          DIGEST="${{ needs.build-and-push.outputs.image_digest }}"
          VALUES="chart-repo/${VALUES_PATH}"

          yq -i ".${SERVICE_KEY}.image.tag = \"${IMAGE_TAG}\"" "$VALUES"
          yq -i ".${SERVICE_KEY}.image.digest = \"${DIGEST}\"" "$VALUES"

          echo "Updated ${VALUES} (${SERVICE_KEY}.image):"
          yq ".${SERVICE_KEY}.image" "$VALUES"

      - name: Commit and push chart update
        run: |
          cd chart-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${VALUES_PATH}"
          git commit -m "chore(payment-server): deploy ${{ needs.build-and-push.outputs.image_tag }}

          digest: ${{ needs.build-and-push.outputs.image_digest }}"
          git push
